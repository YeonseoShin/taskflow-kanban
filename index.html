<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TaskFlow Kanban Board</title>
<link rel="stylesheet" href="style.css" />
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <a href="../../index.html" class="back-btn">←</a>
    <div>
      <div class="board-name">TaskFlow Board</div>
      <div class="board-meta" id="board-meta">로딩 중...</div>
    </div>
  </div>
  <div class="header-center">
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="progress-label" id="progress-label">0% 완료</div>
  </div>
  <div class="header-right">
    <div class="filter-wrap">
      <select id="filter-tag" onchange="applyFilter()">
        <option value="">전체 태그</option>
        <option value="UI/UX">UI/UX</option>
        <option value="Frontend">Frontend</option>
        <option value="Backend">Backend</option>
        <option value="Data">Data</option>
        <option value="QA">QA</option>
        <option value="Bug">Bug</option>
      </select>
      <select id="filter-assignee" onchange="applyFilter()">
        <option value="">전체 담당자</option>
        <option value="신연서">신연서</option>
        <option value="미할당">미할당</option>
      </select>
    </div>
    <button class="new-card-btn" onclick="openModal()">
      <span>+</span> 카드 추가
    </button>
  </div>
</header>

<!-- BOARD -->
<div class="board">
  <div class="col" data-status="todo">
    <div class="col-head">
      <div class="col-head-left">
        <span class="col-dot" style="background:#f59e0b;"></span>
        <span class="col-title">To Do</span>
        <span class="col-cnt" id="cnt-todo">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('todo')" title="카드 추가">+</button>
    </div>
    <div class="col-body" id="kb-todo"></div>
  </div>

  <div class="col" data-status="inprogress">
    <div class="col-head">
      <div class="col-head-left">
        <span class="col-dot" style="background:#6366f1;"></span>
        <span class="col-title">In Progress</span>
        <span class="col-cnt" id="cnt-inprogress">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('inprogress')" title="카드 추가">+</button>
    </div>
    <div class="col-body" id="kb-inprogress"></div>
  </div>

  <div class="col" data-status="review">
    <div class="col-head">
      <div class="col-head-left">
        <span class="col-dot" style="background:#38bdf8;"></span>
        <span class="col-title">Review</span>
        <span class="col-cnt" id="cnt-review">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('review')" title="카드 추가">+</button>
    </div>
    <div class="col-body" id="kb-review"></div>
  </div>

  <div class="col" data-status="done">
    <div class="col-head">
      <div class="col-head-left">
        <span class="col-dot" style="background:#10b981;"></span>
        <span class="col-title">Done</span>
        <span class="col-cnt" id="cnt-done">0</span>
      </div>
      <button class="col-add-btn" onclick="openModal('done')" title="카드 추가">+</button>
    </div>
    <div class="col-body" id="kb-done"></div>
  </div>
</div>

<!-- MODAL -->
<div id="modal-bg" class="modal-bg hidden" onclick="closeModalBg(event)">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">새 카드</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>제목 <span class="required">*</span></label>
        <input type="text" id="m-title" placeholder="작업 내용을 입력하세요" />
      </div>
      <div class="field-row">
        <div class="field">
          <label>태그</label>
          <select id="m-tag">
            <option value="Frontend">Frontend</option>
            <option value="Backend">Backend</option>
            <option value="UI/UX">UI/UX</option>
            <option value="Data">Data</option>
            <option value="QA">QA</option>
            <option value="Bug">Bug</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="field">
          <label>상태</label>
          <select id="m-status">
            <option value="todo">To Do</option>
            <option value="inprogress">In Progress</option>
            <option value="review">Review</option>
            <option value="done">Done</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>담당자</label>
          <input type="text" id="m-assignee" placeholder="이름 (미할당 가능)" />
        </div>
        <div class="field">
          <label>기한</label>
          <input type="date" id="m-due" />
        </div>
      </div>
      <div class="field">
        <label>메모</label>
        <textarea id="m-memo" placeholder="추가 설명 (선택)" rows="2"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-submit" onclick="submitCard()">카드 추가</button>
    </div>
  </div>
</div>

<script src="kanban.js"></script>
</body>
</html>
